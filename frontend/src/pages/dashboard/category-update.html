<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="categories.edit.titlePrefix">Cập nhật danh mục</title>
    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />
  </head>
  <body data-required-roles="ADMIN,MANAGER">
    <div class="app app--with-sidebar">
      <div id="appSidebar"></div>
      <main class="content">
        <header class="topbar">
          <div class="topbar-left">
            <strong id="topbarRoleText">Administrator</strong>
          </div>
          <div class="topbar-right"></div>
        </header>

        <section class="panel">
          <h1 class="page-title">
            <span data-i18n="categories.edit.titlePrefix">Cập nhật danh mục</span> -
            <span id="categoryEditCodeLabel">—</span>
          </h1>
          <p class="form-building-hint">
            <span data-i18n="categories.edit.scopeLabel">Phạm vi:</span>
            <strong id="categoryEditTypeLabel">—</strong>
          </p>
          <form id="categoryEditForm" class="form-grid" novalidate method="post" action="#">
            <div id="categoryEditFormRoot"></div>
          </form>
          <div class="actions actions-centered">
            <button id="categoryEditSaveBtn" class="btn btn-primary" type="submit" form="categoryEditForm" data-i18n="categories.edit.save">
              Cập nhật
            </button>
            <button class="btn btn-success" type="button" id="categoryEditCancelBtn" data-i18n="categories.edit.cancel">Hủy</button>
          </div>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/auth/auth.js"></script>
    <script src="../../assets/js/shared/menu-store.js"></script>
    <script src="../../assets/js/auth/guard.js"></script>
    <script src="../../assets/js/shared/sidebar.js"></script>
    <script src="../../assets/js/shared/i18n-manager.js"></script>
    <script src="../../assets/js/shared/lang-switcher.js"></script>
    <script src="../../assets/js/components/navigation.js"></script>
    <script src="../../assets/js/shared/menu-links.js"></script>
    <script src="../../assets/js/shared/table-controls.js"></script>
    <script src="../../assets/js/shared/room-helpers.js"></script>
    <script src="../../assets/js/api/api-client.js"></script>
    <script src="../../assets/js/main.js"></script>
  </body>
</html>
