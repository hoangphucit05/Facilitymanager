<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thống kê tài sản</title>
    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/components/cards.css" />
  </head>
  <body data-required-roles="ADMIN,MANAGER">
    <div class="app app--with-sidebar">
      <div id="appSidebar"></div>
      <main class="content">
        <header class="topbar">
          <div class="topbar-left">
            <strong id="topbarRoleText">Administrator</strong>
          </div>
          <div class="topbar-right"></div>
        </header>

        <section class="panel statistics-panel">
          <h1 class="page-title" data-i18n="statistics.pageTitle">Thống kê tài sản</h1>

          <p id="statisticsStatusMessage" class="statistics-status" hidden></p>

          <div class="cards-row statistics-kpi-row">
            <div class="stat-card stat-card--qty">
              <p data-i18n="statistics.kpiTotalQuantity">Tổng số lượng tài sản</p>
              <div class="stat-card-value-row">
                <h2 id="statisticsKpiTotalQty">—</h2>
                <span class="stat-card-unit" data-i18n="statistics.unitPieces">(cái)</span>
              </div>
            </div>
            <div class="stat-card stat-card--qty">
              <p data-i18n="statistics.kpiInUse">Đang sử dụng</p>
              <div class="stat-card-value-row">
                <h2 id="statisticsKpiInUse">—</h2>
                <span class="stat-card-unit" data-i18n="statistics.unitPieces">(cái)</span>
              </div>
            </div>
            <div class="stat-card stat-card--qty">
              <p data-i18n="statistics.kpiLiquidated">Thanh lý</p>
              <div class="stat-card-value-row">
                <h2 id="statisticsKpiLiquidated">—</h2>
                <span class="stat-card-unit" data-i18n="statistics.unitPieces">(cái)</span>
              </div>
            </div>
          </div>

          <div class="statistics-charts-row">
            <div class="statistics-chart-card">
              <h3 class="statistics-chart-title" data-i18n="statistics.chartByBuilding">
                Số lượng tài sản theo tòa nhà
              </h3>
              <div class="statistics-chart-wrap">
                <canvas id="statisticsChartBuilding" aria-hidden="true"></canvas>
                <p id="statisticsChartBuildingEmpty" class="statistics-chart-empty" hidden aria-hidden="true">
                  —
                </p>
              </div>
            </div>
            <div class="statistics-chart-card">
              <h3 class="statistics-chart-title" data-i18n="statistics.chartStatusRatio">
                Tỷ lệ tình trạng tài sản
              </h3>
              <div class="statistics-chart-wrap statistics-chart-wrap--donut">
                <canvas id="statisticsChartStatus" aria-hidden="true"></canvas>
                <p id="statisticsChartStatusEmpty" class="statistics-chart-empty" hidden aria-hidden="true">
                  —
                </p>
              </div>
            </div>
          </div>

          <h2 class="statistics-section-title" data-i18n="statistics.summaryTitle">Tổng số lượng tài sản</h2>

          <div class="statistics-table-wrap">
            <table id="statisticsSummaryTable" class="statistics-summary-table">
              <thead>
                <tr>
                  <th data-i18n="statistics.colBuilding">Tòa nhà</th>
                  <th data-i18n="statistics.colQuantity">Số lượng (cái)</th>
                  <th data-i18n="statistics.colInUse">Đang sử dụng</th>
                </tr>
              </thead>
              <tbody id="statisticsSummaryBody">
                <tr>
                  <td colspan="3" class="statistics-placeholder" data-i18n="statistics.loading">Đang tải…</td>
                </tr>
              </tbody>
              <tfoot id="statisticsSummaryFoot" hidden>
                <tr class="statistics-total-row">
                  <th scope="row" data-i18n="statistics.totalRow">Tổng cộng</th>
                  <td id="statisticsTotalQty">—</td>
                  <td id="statisticsTotalInUse">—</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <script src="../../assets/js/auth/auth.js"></script>
    <script src="../../assets/js/shared/menu-store.js"></script>
    <script src="../../assets/js/auth/guard.js"></script>
    <script src="../../assets/js/shared/sidebar.js"></script>
    <script src="../../assets/js/shared/i18n-manager.js"></script>
    <script src="../../assets/js/shared/lang-switcher.js"></script>
    <script src="../../assets/js/components/navigation.js"></script>
    <script src="../../assets/js/shared/menu-links.js"></script>
    <script src="../../assets/js/shared/table-controls.js"></script>
    <script src="../../assets/js/shared/room-helpers.js"></script>
    <script src="../../assets/js/api/api-client.js"></script>
    <script src="../../assets/js/main.js"></script>
  </body>
</html>
