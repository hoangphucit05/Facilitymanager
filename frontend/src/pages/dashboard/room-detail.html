<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết phòng</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f1f5f9;
        padding: 20px;
      }

      .container {
        max-width: 1100px;
        margin: auto;
      }

      .card {
        background: white;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      }

      .title {
        font-size: 28px;
        font-weight: bold;
        color: #1e293b;
        margin-bottom: 20px;
      }

      .room-code {
        color: #2563eb;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .info-box {
        background: #f8fafc;
        padding: 14px;
        border-radius: 14px;
        border-left: 6px solid #2563eb;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .info-box:hover {
        transform: translateY(-3px);
      }

      .label {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 6px;
      }

      .field-icon-wrap {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: #e7f0fc;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .field-icon {
        width: 26px;
        height: 26px;
        color: #2563eb;
      }

      .box-content {
        min-width: 0;
      }

      .value {
        font-size: 20px;
        font-weight: bold;
        color: #0f172a;
      }

      .btn-area {
        text-align: center;
        margin-top: 24px;
      }

      .btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px 28px;
        font-size: 16px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #1d4ed8;
        transform: scale(1.05);
      }

      @media (max-width: 768px) {
        .info-grid {
          grid-template-columns: 1fr;
        }

        .title {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body data-required-roles="ADMIN,MANAGER,STAFF">
    <div class="container">
      <div class="card">
        <div class="title">
          Chi tiết phòng -
          <span id="roomCodeLabel" class="room-code">E1-101</span>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm0 2c-4.33 0-8 2.17-8 5v2h16v-2c0-2.83-3.67-5-8-5Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Giảng viên dạy</div>
              <div id="roomTeacher" class="value">Nguyễn Văn A</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="m12 3 9 4.5-9 4.5L3 7.5 12 3Zm-6 8.06V14.5c0 1.93 2.69 3.5 6 3.5s6-1.57 6-3.5v-3.44L12 14l-6-2.94Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Lớp đang học</div>
              <div id="roomClass" class="value">CNTT</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 5h16a1 1 0 0 1 1 1v12h-2V7H5v11H3V6a1 1 0 0 1 1-1Zm3 4h4v5H7V9Zm6 0h4v5h-4V9Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Số bàn</div>
              <div id="roomDesks" class="value">30</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4h10v7a3 3 0 0 1-3 3h-1v6h-2v-6h-1a3 3 0 0 1-3-3V4Zm1 17h8v-2H8v2Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Số ghế</div>
              <div id="roomChairs" class="value">60</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M13 5v14h-2v-4.5A4.5 4.5 0 0 1 11 5h2Zm4 2.3a7 7 0 0 1 0 9.9l-1.4-1.4a5 5 0 0 0 0-7.1L17 7.3Zm2.8-2.8a11 11 0 0 1 0 15.6l-1.4-1.4a9 9 0 0 0 0-12.8l1.4-1.4Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Loa</div>
              <div id="roomSpeakers" class="value">2</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M11 2h2v3h-2V2Zm7.07 2.93 1.41 1.41-2.12 2.12-1.41-1.41 2.12-2.12ZM2.52 6.34l1.41-1.41 2.12 2.12-1.41 1.41-2.12-2.12ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm8 4h3v2h-3v-2ZM1 11h3v2H1v-2Zm16.95 5.66 2.12 2.12-1.41 1.41-2.12-2.12 1.41-1.41ZM6.05 16.66l1.41 1.41-2.12 2.12-1.41-1.41 2.12-2.12ZM11 19h2v3h-2v-3Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Điều hòa</div>
              <div id="roomAirConditioner" class="value">2</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15a4 4 0 0 0 4-4V7a4 4 0 1 0-8 0v4a4 4 0 0 0 4 4Zm-1 2.93V21h2v-3.07A6 6 0 0 0 18 12h-2a4 4 0 0 1-8 0H6a6 6 0 0 0 5 5.93Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Micro</div>
              <div id="roomMicrophone" class="value">1</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 4h18v16H3V4Zm2 2v12h14V6H5Zm2 2h4v4H7V8Zm6 0h4v4h-4V8Zm-6 6h4v4H7v-4Zm6 0h4v4h-4v-4Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Cửa kính</div>
              <div id="roomGlassDoor" class="value">Không vỡ</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M11 2h2v4h-2V2Zm7.66 3.34 1.41 1.41-2.83 2.83-1.41-1.41 2.83-2.83ZM4.76 8.17 1.93 5.34l1.41-1.41 2.83 2.83-1.41 1.41ZM12 9a3 3 0 0 1 3 3c0 1.31-.84 2.42-2 2.83V22h-2v-7.17A3 3 0 0 1 12 9Zm10 2h-4v2h4v-2ZM2 11h4v2H2v-2Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Quạt trần</div>
              <div id="roomCeilingFan" class="value">4</div>
            </div>
          </div>
          <div class="info-box">
            <span class="field-icon-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 4h18v2H3V4Zm2 4h4v12H5V8Zm10 0h4v12h-4V8Zm-5 0h4v12h-4V8Z"/></svg>
            </span>
            <div class="box-content">
              <div class="label">Rèm cửa</div>
              <div id="roomCurtain" class="value">Có</div>
            </div>
          </div>
        </div>

        <div class="btn-area">
          <button class="btn" type="button" onclick="history.back()">Quay lại</button>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/auth/auth.js"></script>
    <script src="../../assets/js/auth/guard.js"></script>
    <script src="../../assets/js/components/navigation.js"></script>
    <script src="../../assets/js/shared/menu-links.js"></script>
    <script src="../../assets/js/shared/table-controls.js"></script>
    <script src="../../assets/js/shared/room-helpers.js"></script>
    <script src="../../assets/js/api/api-client.js"></script>
    <script src="../../assets/js/main.js"></script>
  </body>
</html>
