<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý user</title>
    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />
  </head>
  <body data-required-roles="ADMIN,MANAGER,STAFF">
    <div class="app app--with-sidebar">
      <div id="appSidebar"></div>
      <main class="content">
        <header class="topbar">
          <div class="topbar-left">
            <strong id="topbarRoleText">Administrator</strong>
          </div>
          <div class="topbar-right"></div>
        </header>

        <h1 class="page-title" data-i18n="users.pageTitle">Quản lý user</h1>
        <section class="panel">
          <div class="tabs">
            <a class="tab tab-active" href="../profile/users.html" data-i18n="users.tabList">Danh sách</a>
            <a class="tab" href="../profile/users-add.html" data-i18n="users.tabAdd">Thêm user</a>
            <button type="button" class="tab" id="usersExportJsonBtn" data-i18n="toolbar.exportJson">Xuất JSON</button>
          </div>
          <div class="toolbar">
            <div class="toolbar-left">
              <span data-i18n="toolbar.showRows">Hiển thị</span>
              <select id="usersPageSizeSelect" style="width: 72px; padding: 6px 8px; border: 1px solid #d5dde7; border-radius: 4px">
                <option>10</option>
                <option>20</option>
                <option>50</option>
              </select>
            </div>
            <div class="toolbar-search">
              <input id="usersSearchInput" class="table-search-input" type="search" data-i18n-placeholder="buttons.search" placeholder="Tìm kiếm" />
            </div>
          </div>
          <table>
            <thead><tr><th data-i18n="table.users.id">ID</th><th data-i18n="table.users.username">Username</th><th data-i18n="table.users.fullname">Fullname</th><th data-i18n="table.users.status">Trạng thái</th><th data-i18n="table.users.role">Chức vụ</th><th data-i18n="table.users.avatar">Avatar</th><th data-i18n="table.users.actions">Chức năng</th></tr></thead>
            <tbody>
              <tr class="users-initial-loading">
                <td colspan="7" style="text-align: center; padding: 24px" data-i18n="common.loadingData">Đang tải dữ liệu…</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/auth/auth.js"></script>
    <script src="../../assets/js/shared/menu-store.js"></script>
    <script src="../../assets/js/auth/guard.js"></script>
    <script src="../../assets/js/shared/sidebar.js"></script>
    <script src="../../assets/js/shared/i18n-manager.js"></script>
    <script src="../../assets/js/shared/lang-switcher.js"></script>
    <script src="../../assets/js/components/navigation.js"></script>
    <script src="../../assets/js/shared/menu-links.js"></script>
    <script src="../../assets/js/shared/table-controls.js"></script>
    <script src="../../assets/js/shared/room-helpers.js"></script>
    <script src="../../assets/js/shared/user-avatar.js"></script>
    <script src="../../assets/js/api/giaoDienApi.js"></script>
    <script src="../../assets/js/shared/export-json.js"></script>
    <script src="../../assets/js/main.js"></script>
  </body>
</html>
