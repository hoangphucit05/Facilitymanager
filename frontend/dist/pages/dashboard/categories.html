<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="categories.views.default.title">Quản lý danh mục</title>
    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />
  </head>
  <body data-required-roles="ADMIN,MANAGER">
    <div class="app app--with-sidebar">
      <div id="appSidebar"></div>
      <main class="content">
        <header class="topbar">
          <div class="topbar-left">
            <strong id="topbarRoleText">Administrator</strong>
          </div>
          <div class="topbar-right"></div>
        </header>

        <section class="panel">
          <h1 class="page-title">Quản lý danh mục tài sản</h1>
          <div class="tabs">
            <button id="categoryTabList" class="tab tab-active" type="button">Tất cả danh mục</button>
            <button id="categoryTabAdd" class="tab" type="button">Thêm danh mục</button>
            <button type="button" class="tab" id="categoriesExportJsonBtn" data-i18n="toolbar.exportJson">Xuất JSON</button>
            <button id="categoryTabExtra" class="tab" type="button" hidden>Bổ sung</button>
          </div>

          <div id="categoryListSection">
            <div class="toolbar">
              <div class="toolbar-left">
                <span data-i18n="toolbar.showRows">Hiển thị</span>
                <select
                  id="categoryPageSizeSelect"
                  style="width: 72px; padding: 6px 8px; border: 1px solid #d5dde7; border-radius: 4px"
                >
                  <option>10</option>
                  <option>20</option>
                  <option>50</option>
                </select>
              </div>
              <div class="toolbar-search">
                <input
                  id="categorySearchInput"
                  class="table-search-input"
                  type="search"
                  data-i18n-placeholder="categories.searchPlaceholder"
                  placeholder="Tìm kiếm"
                />
              </div>
            </div>
            <table>
              <thead>
                <tr id="categoryTableHeadRow">
                  <th>ID</th>
                  <th>Mã danh mục</th>
                  <th>Tên danh mục</th>
                  <th>Chức năng</th>
                </tr>
              </thead>
              <tbody id="categoryTableBody">
                <tr data-category-id="1">
                  <td>1</td>
                  <td>MM-TB</td>
                  <td>Máy móc, thiết bị</td>
                  <td>Sửa/Xóa</td>
                </tr>
                <tr data-category-id="2">
                  <td>2</td>
                  <td>CC-DC</td>
                  <td>Công cụ, dụng cụ</td>
                  <td>Sửa/Xóa</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div id="categoryAddSection" hidden>
            <form id="categoryForm" class="modern-form form-vertical" method="post" action="#">
              <div class="field">
                <label for="categoryNameInput">Tên danh mục</label>
                <input id="categoryNameInput" name="categoryName" type="text" placeholder="Nhập tên danh mục" />
                <p id="categoryNameError" class="field-hint" hidden data-i18n="categories.validationRequired">
                  Hãy nhập danh mục của bạn !
                </p>
              </div>
              <div class="field">
                <label for="categoryCodeInput">Mã danh mục</label>
                <input id="categoryCodeInput" name="categoryCode" type="text" placeholder="Ví dụ: MM-TB" />
                <select id="categoryCodeSelect" name="categoryType" hidden></select>
              </div>
              <div class="actions">
                <button class="btn btn-primary" type="submit">Thêm</button>
                <button id="categoryResetBtn" class="btn btn-success" type="button">Nhập lại</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/auth/auth.js"></script>
    <script src="../../assets/js/shared/menu-store.js"></script>
    <script src="../../assets/js/auth/guard.js"></script>
    <script src="../../assets/js/shared/sidebar.js"></script>
    <script src="../../assets/js/shared/i18n-manager.js"></script>
    <script src="../../assets/js/shared/lang-switcher.js"></script>
    <script src="../../assets/js/components/navigation.js"></script>
    <script src="../../assets/js/shared/menu-links.js"></script>
    <script src="../../assets/js/shared/table-controls.js"></script>
    <script src="../../assets/js/shared/room-helpers.js"></script>
    <script src="../../assets/js/api/giaoDienApi.js"></script>
    <script src="../../assets/js/shared/export-json.js"></script>
    <script src="../../assets/js/main.js"></script>
  </body>
</html>
